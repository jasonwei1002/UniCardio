name: UniCardio
channels:
  - pytorch
  - nvidia
  - conda-forge
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/pytorch
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main
  - defaults
dependencies:
  - python=3.10
  - pip
  # 系统依赖库
  - _libgcc_mutex=0.1
  - _openmp_mutex=4.5
  - blas=1.0=mkl
  - ca-certificates
  - certifi
  - cuda-runtime=11.8  # 这里的Conda CUDA运行时保留
  - ffmpeg=4.3
  - freetype
  - intel-openmp
  - jpeg
  - libffi
  - libgcc-ng
  - libstdcxx-ng
  - mkl
  - ncurses
  - openssl
  - pillow
  - readline
  - sqlite
  - tk
  - xz
  - zlib
  - pip:
      # --- 1. 必须放在第一行：指定 PyTorch 的 whl 源 ---
      - --extra-index-url https://download.pytorch.org/whl/cu118
      
      # --- 2. 核心 PyTorch 组件 (2.0.1 版本) ---
      - torch==2.0.1+cu118
      - torchvision==0.15.2+cu118
      - torchaudio==2.0.2+cu118
      
      # --- 3. 修复冲突的关键点：降级 Lightning ---
      # 原来的 lightning==2.4.0 需要 torch>=2.1，改为 2.0.3 以匹配 torch 2.0
      - lightning==2.0.3 
      # 保持 pytorch-lightning 版本一致，避免 API 混乱
      - pytorch-lightning==2.0.3
      - torchmetrics>=0.11.0
      
      # --- 4. 核心信号处理 ---
      - numpy==1.24.3
      - pandas==1.5.3
      - scipy==1.10.1
      - neurokit2==0.2.10
      - wfdb==4.1.2
      - mat73==0.65
      - librosa==0.10.2.post1
      
      # --- 5. 修复 MoviePy 和其他 ---
      - moviepy==1.0.3  # 使用最稳定的旧版，避免 dev0 报错
      - setuptools
      - filelock
      - fsspec
      
      # --- 6. 其他依赖 ---
      - absl-py==2.1.0
      - addict==2.4.0
      - aliyun-python-sdk-core==2.16.0
      - aliyun-python-sdk-kms==2.16.5
      - einops==0.6.0
      - h5py==3.12.1
      - huggingface-hub==0.26.0
      - transformers
      - timm==1.0.11
      # OpenMMLab 相关依赖未在仓库代码中使用，且 mmcv 在当前环境下会触发源码编译失败
      - opencv-python==4.10.0.84
      - scikit-learn==1.2.2
      - seaborn==0.13.2
      - tqdm==4.65.2
      - tensorboard==2.18.0
      - werkzeug==3.0.6
