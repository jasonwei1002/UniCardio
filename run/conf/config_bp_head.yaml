# BP head 训练主配置
#
# Hydra 把本文件与 data/default、model/bp_head、trainer/bp_head 组合起来。
# CLI 覆盖示例:
#   python run/pipeline/train_bp_head.py trainer.epochs=10 device=cpu

defaults:
  - data: default
  - model: bp_head
  - trainer: bp_head
  - _self_

seed: 42
device: cuda
deterministic: false
output_dir: ${hydra:runtime.output_dir}

swanlab:
  enabled: true
  project: UniCardio
  experiment_name: null
  description: null
  tags: [bp_head]
  mode: cloud

hydra:
  run:
    # 用 BP_HEAD_STAGE env var 区分 pretrain/finetune 目录后缀。
    dir: run/outputs/${now:%Y-%m-%d_%H-%M-%S}_bp_head_${oc.env:BP_HEAD_STAGE,pretrain}
  sweep:
    dir: run/outputs/sweep_${now:%Y-%m-%d_%H-%M-%S}_bp_head_${oc.env:BP_HEAD_STAGE,pretrain}
    subdir: ${hydra.job.num}
  job:
    chdir: false
