# 数据集配置
#
# 通过 `data.name` 在多个数据集之间切换；每个数据集的具体参数（路径、
# 通道置换、划分逻辑）放在同名子节里。模型配置通过 `${data.slot_length}`
# 单点引用本文件的 slot_length，避免数据/模型 slot 长度不一致。
#
# 数据加载器读取后会执行：
#   1) `channel_permutation` 通道置换（让模型 slot 顺序统一为 ECG/PPG/ABP）
#   2) ABP 波形通道：per-sample min-max → [0, 1]（MD-ViSCo approximation 同款）
#   3) 若 `bp_label_norm` 非空：SBP/DBP 标量标签按 dataset-global min-max
#      映射到 [0, 1] 域（MD-ViSCo refinement 同款）；损失在归一化空间，
#      ME/SD/MAE 报表反归一化回 mmHg。

name: pulsedb

# 从同名子节解析；切换 name 自动联动。
slot_length: ${.${.name}.slot_length}

# Final_sig_combined.npy：单文件 train+val+test 三划分。
# 文件通道顺序 (PPG, BP, ECG) -> 模型顺序 (ECG, PPG, ABP)
combined:
  data_path: ${oc.env:UNICARDIO_DATA,data/Final_sig_combined.npy}
  channel_permutation: [2, 0, 1]
  slot_length: 500
  val_size: 20000
  test_size: 20000

# PulseDB：Train_Subset.npy 8:2 划分得 train/val，CalFree_Test_Subset.npy 作为 test。
# 文件已按 (ECG, PPG, ABP) 顺序保存（见 script/convert_h5_to_npy_csv.py），
# channel_permutation 走 identity。
pulsedb:
  train_path: data/pulsedb/Train_Subset.npy
  test_path: data/pulsedb/CalFree_Test_Subset.npy
  channel_permutation: [0, 1, 2]
  slot_length: 1250
  # 阶段一（pretrain）：Train_Subset 内部 train/val 划分。
  val_ratio: 0.2
  # 阶段二（finetune）：CalFree 内部三划分（默认 80/10/10）。两者之和必须 < 1。
  finetune_val_ratio: 0.1
  finetune_test_ratio: 0.1
  # BP 标签全局 min-max 归一化（MD-ViSCo refinement 同款；IEEE JBHI 2026 Sec III.D）。
  # 常数在 Train_Subset.csv 的 SBP+DBP 联合分布上计算，P0.5≈36.4 / P99.5≈173.9 mmHg，
  # 取圆整边界覆盖 >99% 数据。超界样本归一化后会略 <0 或 >1，无需 clip。
  bp_label_norm:
    vmin: 40.0
    vmax: 180.0

split_seed: 42

# BP head 回归目标的 SBP/DBP 来源（仅 BP head 训练/评估读取）：
#   segment_minmax  —— 用本段 ABP 的 max/min（= abp_minmax），对齐 MD-ViSCo
#                      "SBP/DBP = max/min of ABP" 的定义，使 ME/SD 与其 Table III
#                      测同一量（默认）。
#   per_cycle_mean  —— 用 CSV 的 PulseDB 官方 per-cycle-mean 标签（legacy）。
bp_label_source: segment_minmax

batch_size: 512
num_workers: 8
pin_memory: true

# Legacy ABP 波形归一化（仅 `combined` 数据集旧路径用，pulsedb 已切到
# per-sample min-max；保留这两个常数仅为兼容旧 ckpt 评估）。
bp_offset: 100.0
bp_scale: 50.0

# 顶层快捷访问：与 `${.${.name}.bp_label_norm}` 等价，便于 trainer / evaluate
# 入口直接读取常数。子数据集不开启时此节为 null，下游需做空值判断。
bp_label_norm: ${.${.name}.bp_label_norm}
