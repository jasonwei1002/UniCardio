# PulseDB 数据集配置（项目当前唯一目标数据集）。
#
# 数据来源：
#   train_path: 902,160 个 (3, 1250) 窗口（10 s @125 Hz），从中按 sklearn
#               train_test_split 切出 (1 - val_split) / val_split 两份做训练 / 验证。
#               注意此处是 sample-level random split（同一 subject 的多个窗口
#               可能跨 train/val），val 仅用作 best.pt 选择信号；CalFree_Test_Subset
#               本身已是 subject-disjoint 的 calibration-free 测试集，对最终评估无 leak。
#   test_path: 111,600 个独立窗口，subject 不与 train 重合。
#
# .npy 必须按模型 slot 顺序 (ECG, PPG, ABP) 存好；ECG/PPG 在源文件里已经做过
# per-sample min-max 到 [0, 1]，ABP 是 mmHg 物理量。CardiacDataset 加载时再
# 跑一次 min-max（幂等）+ 对 ABP 应用 (x - 100) / 50。
#
# 模型配置通过 ${data.slot_length} 引用本文件，避免数据/模型 slot 长度不一致。
# evaluate.py 通过 ${data.srate} 拿采样率驱动 pyvital 的 SBP/DBP 提取。

slot_length: 1250
srate: 125

train_path: data/pulsedb/Train_Subset.npy
test_path: data/pulsedb/CalFree_Test_Subset.npy

# train_path 内部按 (1 - val_split) : val_split 切训练 / 验证。
# split_seed 固定可复现；若想用全局 seed 则在命令行覆盖为 ${seed}。
val_split: 0.2
split_seed: 42

batch_size: 512
num_workers: 12
pin_memory: true

# BP 归一化常数，放在配置里方便评估阶段反归一化时引用，避免改动代码。
bp_offset: 100.0
bp_scale: 50.0
