# MIMIC-BP 数据集配置（项目当前唯一目标数据集）。
#
# subject-level 切分由 data/mimicbp/{train,val,test}_subjects.txt 决定，
# 30 s @125 Hz 段切成 7 个不重叠 4 s 片段（丢弃末尾 2 s），由
# script/convert_mimicbp_to_500.py 预生成。.npy 必须按模型 slot 顺序
# (ECG, PPG, ABP) 存好；加载阶段只对 ABP 应用 (x - 100) / 50 归一化。
#
# 模型配置通过 ${data.slot_length} 引用本文件，避免数据/模型 slot 长度不一致。
# evaluate.py 通过 ${data.srate} 拿采样率驱动 pyvital 的 SBP/DBP 提取。

slot_length: 500
srate: 125

train_path: data/mimicbp/Train_mimicbp_500.npy
val_path: data/mimicbp/Val_mimicbp_500.npy
test_path: data/mimicbp/Test_mimicbp_500.npy

batch_size: 512
num_workers: 12
pin_memory: true

# BP 归一化常数，放在配置里方便评估阶段反归一化时引用，避免改动代码。
bp_offset: 100.0
bp_scale: 50.0
