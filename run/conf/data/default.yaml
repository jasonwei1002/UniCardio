# 数据集配置
#
# 通过 `data.name` 在多个数据集之间切换；每个数据集的具体参数（路径、
# 通道置换、划分逻辑）放在同名子节里。模型配置通过 `${data.slot_length}`
# 单点引用本文件的 slot_length，避免数据/模型 slot 长度不一致。
#
# 数据加载器读取后会执行：
#   1) `channel_permutation` 通道置换（让模型 slot 顺序统一为 ECG/PPG/ABP）
#   2) ABP 通道归一化 (x - 100) / 50

name: pulsedb

# 从同名子节解析；切换 name 自动联动。
slot_length: ${.${.name}.slot_length}

# Final_sig_combined.npy：单文件 train+val+test 三划分。
# 文件通道顺序 (PPG, BP, ECG) -> 模型顺序 (ECG, PPG, ABP)
combined:
  data_path: ${oc.env:UNICARDIO_DATA,data/Final_sig_combined.npy}
  channel_permutation: [2, 0, 1]
  slot_length: 500
  val_size: 20000
  test_size: 20000

# PulseDB：Train_Subset.npy 8:2 划分得 train/val，CalFree_Test_Subset.npy 作为 test。
# 文件已按 (ECG, PPG, ABP) 顺序保存（见 script/convert_h5_to_npy_csv.py），
# channel_permutation 走 identity。
pulsedb:
  train_path: data/pulsedb/Train_Subset.npy
  test_path: data/pulsedb/CalFree_Test_Subset.npy
  channel_permutation: [0, 1, 2]
  slot_length: 1250
  # 阶段一（pretrain）：Train_Subset 内部 train/val 划分。
  val_ratio: 0.2
  # 阶段二（finetune）：CalFree 内部三划分（默认 80/10/10）。两者之和必须 < 1。
  finetune_val_ratio: 0.1
  finetune_test_ratio: 0.1

split_seed: 42

batch_size: 512
num_workers: 8
pin_memory: true

# BP 归一化常数，放在配置里方便评估阶段反归一化时引用，避免改动代码。
bp_offset: 100.0
bp_scale: 50.0
