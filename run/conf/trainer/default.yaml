# 训练循环配置
#
# objective: 切换训练目标。
#   - rf:         Rectified Flow（v-prediction，logit-normal t，Euler 采样）
#   - regression: deterministic baseline，单 forward 直接 MSE(pred_x1, x1)
#                 与 RF 共享 backbone；t 固定为 0、target slot 填零作为模式 token。
#                 推断时调 src.trainer_module.regression.regression_sample（单 forward）。

objective: rf

epochs: 120
lr: 1.0e-3

# subject-level split + ~1100 train subjects 下，1e-6 等于无正则；
# 上一轮（2026-05-05 mimic-bp run）从 ep 58 开始 val 反弹、ep 195 时 val 比最佳点高 22.6%。
# 1e-4 是 Adam（耦合 wd）下相对保守的起点，不动 optimizer 也能拉一档泛化。
weight_decay: 1.0e-4

# 梯度范数裁剪（L2）。RF 速度 MSE 偶尔会因某个 outlier batch 产生爆炸 step，
# Adam 第二动量累积后尤其明显。≤0 / null 关闭。1.0 是 SD3 / Flow Matching
# 的通用默认值。
grad_clip_norm: 1.0


warmup_pct: 0.005


lr_scheduler:
  name: cosine
  min_lr: 1.0e-6

amp:
  enabled: true

# Tier 1：torch.compile 包装顶层 UniCardioRF。仅 CUDA 生效，CPU 自动跳过。
# mode 选 "default"：reduce-overhead 会通过 CUDA Graphs 常驻一份输入/输出
# buffer（trace 上显示 ~14 GB 的 private pool），在大 batch 下得不偿失。
compile:
  enabled: true
  mode: default

# Logit-normal 时间采样（Esser 等人 2024 "SD3"）。仅 RF objective 使用。
t_sampler:
  name: logit_normal
  mean: 0.0
  std: 1.0

# RF t-bin 验证诊断：在 5 个固定 t 值各跑一遍 val（前 max_batches 个 batch），
# 看 plateau 是否由 t≈0 / t≈1（ε 主导段）贡献。仅 objective=rf 时生效。
t_bin_diagnostic:
  enabled: false
  t_values: [0.1, 0.3, 0.5, 0.7, 0.9]
  max_batches: 64
  every: 5

# 任务采样权重。当前聚焦 cuffless BP 估计，只训练 3 个 ABP-target 任务；
# ECG↔PPG 两个方向都属于 "易得 → 易得"，不构成独立的临床产品功能，设 0
# 从训练采样里剔除（`_weighted_task_sampler` 接受 0 权重，只要总和 > 0）。
# 三个 ABP 任务共享 target_slot=2，对 torch.compile 更友好（Dynamo 只需
# 特化一种 target_slot 变体）。
task_weights:
  ecg2ppg: 0.0
  ppg2ecg: 0.0
  ecg2abp: 1.0
  ppg2abp: 1.0
  ecgppg2abp: 1.0

# 记账项。
val_every: 1
ckpt_every: 1
itr_per_epoch: null        # null 表示遍历整个 DataLoader
log_filename: loss.csv
