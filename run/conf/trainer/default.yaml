# 训练循环配置

epochs: 500
lr: 1.0e-3                

weight_decay: 1.0e-6

# 梯度范数裁剪（L2）。RF 速度 MSE 偶尔会因某个 outlier batch 产生爆炸 step，
# Adam 第二动量累积后尤其明显。≤0 / null 关闭。1.0 是 SD3 / Flow Matching
# 的通用默认值。
grad_clip_norm: 1.0


warmup_pct: 0.005


lr_scheduler:
  name: cosine
  min_lr: 1.0e-6

amp:
  enabled: true

# Tier 1：torch.compile 包装顶层 UniCardioRF。仅 CUDA 生效，CPU 自动跳过。
# mode 选 "default"：reduce-overhead 会通过 CUDA Graphs 常驻一份输入/输出
# buffer（trace 上显示 ~14 GB 的 private pool），在大 batch 下得不偿失。
compile:
  enabled: true
  mode: default

# Logit-normal 时间采样（Esser 等人 2024 "SD3"）。
t_sampler:
  name: logit_normal
  mean: 0.0
  std: 1.0

# 任务采样权重。当前聚焦 cuffless BP 估计，只训练 3 个 ABP-target 任务；
# ECG↔PPG 两个方向都属于 "易得 → 易得"，不构成独立的临床产品功能，设 0
# 从训练采样里剔除（`_weighted_task_sampler` 接受 0 权重，只要总和 > 0）。
# 三个 ABP 任务共享 target_slot=2，对 torch.compile 更友好（Dynamo 只需
# 特化一种 target_slot 变体）。
task_weights:
  ecg2ppg: 0.0
  ppg2ecg: 0.0
  ecg2abp: 1.0
  ppg2abp: 1.0
  ecgppg2abp: 1.0

# 记账项。
val_every: 1
ckpt_every: 1
itr_per_epoch: null        # null 表示遍历整个 DataLoader
log_filename: loss.csv

# 可选：从 checkpoint 路径断点续训（相对/绝对路径均可）。
# 完整恢复 model + optimizer + scheduler + epoch；lr 走原 cosine 轨迹。
# 与 init_from 互斥。
resume_from: null

# 可选：从 checkpoint 加载**仅模型权重**作为初始化（fine-tune 入口）。
# optimizer / scheduler / epoch 都按当前 cfg 新建——可以换 lr / 换 warmup /
# 换 epochs。与 resume_from 互斥。
init_from: null
