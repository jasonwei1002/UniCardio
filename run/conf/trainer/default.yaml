# 训练循环配置

epochs: 200
lr: 1.0e-3                

weight_decay: 1.0e-6

# L2 grad-norm clip. ≤0 / null disables. 1.0 = SD3 / Flow-Matching default;
# RF velocity MSE has outlier batches that blow up Adam.
grad_clip_norm: 1.0


lr_scheduler:
  name: cosine
  min_lr: 1.0e-6
  # 1.0 = single cosine (CosineAnnealingLR). <1.0 = warm restart
  # (CosineAnnealingWarmRestarts); each restart returns to peak lr
  # (torch has no peak decay).
  first_cycle_pct: 0.5
  # Integer cycle-length multiplier; only used when first_cycle_pct < 1.0.
  # 1 = equal cycles; 2 = doubling (SGDR original).
  cycle_mult: 1

amp:
  enabled: true

# max-autotune: first epoch spends minutes autotuning Triton kernels +
# CUDA Graphs, then 5-15% faster than reduce-overhead. ~10-15 GB private pool.
compile:
  enabled: true
  mode: max-autotune

# Logit-normal 时间采样（Esser 等人 2024 "SD3"）。
t_sampler:
  name: logit_normal
  mean: 0.0
  std: 1.0

# All three ABP tasks share target_slot=2, keeping torch.compile to one
# specialization. Zero-weight tasks are dropped by the sampler.
task_weights:
  ecg2ppg: 0.0
  ppg2ecg: 0.0
  ecg2abp: 1.0
  ppg2abp: 1.0
  ecgppg2abp: 1.0

val_every: 1
ckpt_every: 1
itr_per_epoch: null        # null 表示遍历整个 DataLoader
log_filename: loss.csv

# 可选：从 checkpoint 加载**仅模型权重**作为初始化（fine-tune 入口）。
# optimizer / scheduler / epoch 都按当前 cfg 新建——可以换 lr / 换 epochs。
init_from: null

# 训练阶段：
#   - 'pretrain'：阶段一，正常训练完整 UniCardioRF（默认）。
#   - 'finetune'：阶段二，加载 init_from 后冻结 backbone，仅解冻
#     finetune.n_unfrozen_blocks 个 ResidualBlock + 全部 output_heads；
#     训练结束后自动在 test split 上跑一次 RF loss 评估。
#     需配合 trainer.init_from=<阶段一 ckpt>，且数据用 mode='finetune'
#     做 80/10/10 划分（详见 src/data_module/datamodule.py）。
stage: pretrain
finetune:
  # 解冻最后 N 个 ResidualBlock；output_heads 始终解冻。
  # 0 表示仅微调 output_heads；>=5 等价于只冻结 input stem + time embedding。
  n_unfrozen_blocks: 2
