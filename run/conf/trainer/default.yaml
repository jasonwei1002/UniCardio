# Training loop configuration.

epochs: 800
lr: 1.0e-3
weight_decay: 1.0e-6

# MultiStepLR milestones as fractions of total epochs; matches the original
# schedule (0.18 * epochs, 0.75 * epochs, gamma=0.1).
lr_scheduler:
  name: multistep
  milestones_pct: [0.18, 0.75]
  gamma: 0.1

# Logit-normal time sampling (Esser et al., 2024 "SD3").
t_sampler:
  name: logit_normal
  mean: 0.0
  std: 1.0

# Task sampling: uniform over the 5 task types. Weighted sampling is exposed
# for future tuning but default to balanced.
task_weights:
  ecg2ppg: 1.0
  ppg2ecg: 1.0
  ecg2abp: 1.0
  ppg2abp: 1.0
  ecgppg2abp: 1.0

# Bookkeeping.
val_every: 10
ckpt_every: 1
itr_per_epoch: null        # null -> iterate the full DataLoader
log_filename: loss.csv

# Optional: resume from a checkpoint path (relative or absolute).
resume_from: null
