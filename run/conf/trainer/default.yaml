# 训练循环配置

epochs: 300
lr: 1.0e-3                # SD3/RF 速度回归的惯常值；2e-3 在 bf16 + Adam 下已实测
                          # 在 epoch ~10 warmup 爬升期发散（ox-3 run，无 grad clip）
weight_decay: 1.0e-6

# 梯度范数裁剪（L2）。RF 速度 MSE 偶尔会因某个 outlier batch 产生爆炸 step，
# Adam 第二动量累积后尤其明显。≤0 / null 关闭。1.0 是 SD3 / Flow Matching
# 的通用默认值。
grad_clip_norm: 1.0

# Linear warmup 的长度，填占总训练的比例（0~1 之间）。比如 0.005 表示 0.5%
# 的 total_steps 用来 warmup；换 epochs / batch / 数据量时这个比例保持不变。
# 实际 step 数 = round(warmup_pct * total_steps)，在 _build_scheduler 里运行
# 时换算。设 0 可关闭 warmup。
# 0.005 ≈ 1–2 epoch（对齐 rooster-11 / SD3 的短 warmup 实践）：Adam 第二动量
# 时间常数约 1000 step，短 warmup 够 settle；grad_clip_norm 承担爆炸兜底。
warmup_pct: 0.005

# Cosine annealing（不做 warm restart）。使用 katsura-jp/cosine_annealing_warmup
# 的 CosineAnnealingWarmupRestarts，把 first_cycle_steps 固定成整段训练的
# total_steps，所以训练在首个 cycle 内完成、不触发 restart。
# warmup_steps 阶段 lr 从 min_lr 线性升到 cfg.lr（作为 max_lr），之后 cosine
# 退火到 min_lr。整套调度按 step 推进。
lr_scheduler:
  name: cosine
  min_lr: 1.0e-6

# 自动混合精度（AMP）。仅在 CUDA 上启用，固定使用 bfloat16：
# Ada/Ampere+ 与 fp16 吞吐相同，动态范围=fp32，无需 GradScaler。
amp:
  enabled: true

# Tier 1：torch.compile 包装顶层 UniCardioRF。仅 CUDA 生效，CPU 自动跳过。
# mode 选 "default"：reduce-overhead 会通过 CUDA Graphs 常驻一份输入/输出
# buffer（trace 上显示 ~14 GB 的 private pool），在大 batch 下得不偿失。
compile:
  enabled: true
  mode: default

# Logit-normal 时间采样（Esser 等人 2024 "SD3"）。
t_sampler:
  name: logit_normal
  mean: 0.0
  std: 1.0

# 任务采样权重。当前聚焦 cuffless BP 估计，只训练 3 个 ABP-target 任务；
# ECG↔PPG 两个方向都属于 "易得 → 易得"，不构成独立的临床产品功能，设 0
# 从训练采样里剔除（`_weighted_task_sampler` 接受 0 权重，只要总和 > 0）。
# 三个 ABP 任务共享 target_slot=2，对 torch.compile 更友好（Dynamo 只需
# 特化一种 target_slot 变体）。
task_weights:
  ecg2ppg: 0.0
  ppg2ecg: 0.0
  ecg2abp: 1.0
  ppg2abp: 1.0
  ecgppg2abp: 1.0

# 记账项。
val_every: 1
ckpt_every: 1
itr_per_epoch: null        # null 表示遍历整个 DataLoader
log_filename: loss.csv

# 可选：从 checkpoint 路径断点续训（相对/绝对路径均可）。
resume_from: null
