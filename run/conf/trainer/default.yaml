# 训练循环配置

epochs: 800
lr: 2.0e-3                # Tier 1：batch 128→512 对应 sqrt scaling (1e-3 * 2)
weight_decay: 1.0e-6

# Linear warmup 的步数。默认 520 ≈ 1 epoch @ B=512 (train_N≈265k)。
# 设 0 可关闭 warmup。
warmup_steps: 520

# lr_scheduler.milestones_pct 的语义是"占总训练进度的比例"；换算到 step 粒度
# （total_steps = epochs * steps_per_epoch），整套调度（含 warmup）都按 step 推进。
lr_scheduler:
  name: multistep
  milestones_pct: [0.18, 0.75]
  gamma: 0.1

# 自动混合精度（AMP）。仅在 CUDA 上启用，固定使用 bfloat16：
# Ada/Ampere+ 与 fp16 吞吐相同，动态范围=fp32，无需 GradScaler。
amp:
  enabled: true

# Tier 1：torch.compile 包装顶层 UniCardioRF。仅 CUDA 生效，CPU 自动跳过。
compile:
  enabled: true
  mode: reduce-overhead

# Logit-normal 时间采样（Esser 等人 2024 "SD3"）。
t_sampler:
  name: logit_normal
  mean: 0.0
  std: 1.0

# 任务采样：5 个任务均匀采样。为未来调参保留按任务加权采样接口，
# 默认全部权重为 1。
task_weights:
  ecg2ppg: 1.0
  ppg2ecg: 1.0
  ecg2abp: 1.0
  ppg2abp: 1.0
  ecgppg2abp: 1.0

# 记账项。
val_every: 10
ckpt_every: 1
itr_per_epoch: null        # null 表示遍历整个 DataLoader
log_filename: loss.csv

# 可选：从 checkpoint 路径断点续训（相对/绝对路径均可）。
resume_from: null
