# 训练循环配置

epochs: 300
lr: 1.0e-3                

weight_decay: 1.0e-6

# 梯度范数裁剪（L2）。RF 速度 MSE 偶尔会因某个 outlier batch 产生爆炸 step，
# Adam 第二动量累积后尤其明显。≤0 / null 关闭。1.0 是 SD3 / Flow Matching
# 的通用默认值。
grad_clip_norm: 1.0


warmup_pct: 0.005


lr_scheduler:
  name: cosine
  min_lr: 1.0e-6

amp:
  enabled: true

# Tier 1：torch.compile 包装顶层 UniCardioRF。仅 CUDA 生效，CPU 自动跳过。
# mode 选 "max-autotune"：Triton kernel autotune + CUDA Graphs。首个 epoch
# 卡在 autotuning（数分钟）属正常；之后稳态比 reduce-overhead 再快 5-15%。
# 显存代价与 reduce-overhead 同量级（~10-15 GB private pool），H20 96GB 下可承受。
compile:
  enabled: true
  mode: max-autotune

# Logit-normal 时间采样（Esser 等人 2024 "SD3"）。
t_sampler:
  name: logit_normal
  mean: 0.0
  std: 1.0

# 任务采样权重。当前聚焦 cuffless BP 估计，只训练 3 个 ABP-target 任务；
# ECG↔PPG 两个方向都属于 "易得 → 易得"，不构成独立的临床产品功能，设 0
# 从训练采样里剔除（`_weighted_task_sampler` 接受 0 权重，只要总和 > 0）。
# 三个 ABP 任务共享 target_slot=2，对 torch.compile 更友好（Dynamo 只需
# 特化一种 target_slot 变体）。
task_weights:
  ecg2ppg: 0.0
  ppg2ecg: 0.0
  ecg2abp: 1.0
  ppg2abp: 1.0
  ecgppg2abp: 1.0

# 记账项。
val_every: 1
ckpt_every: 1
itr_per_epoch: null        # null 表示遍历整个 DataLoader
log_filename: loss.csv

# 可选：从 checkpoint 加载**仅模型权重**作为初始化（fine-tune 入口）。
# optimizer / scheduler / epoch 都按当前 cfg 新建——可以换 lr / 换 warmup /
# 换 epochs。
init_from: null

# 训练阶段：
#   - 'pretrain'：阶段一，正常训练完整 UniCardioRF（默认）。
#   - 'finetune'：阶段二，加载 init_from 后冻结 backbone，仅解冻
#     finetune.n_unfrozen_blocks 个 ResidualBlock + 全部 output_heads；
#     训练结束后自动在 test split 上跑一次 RF loss 评估。
#     需配合 trainer.init_from=<阶段一 ckpt>，且数据用 mode='finetune'
#     做 80/10/10 划分（详见 src/data_module/datamodule.py）。
stage: pretrain
finetune:
  # 解冻最后 N 个 ResidualBlock；output_heads 始终解冻。
  # 0 表示仅微调 output_heads；>=5 等价于只冻结 input stem + time embedding。
  n_unfrozen_blocks: 2
