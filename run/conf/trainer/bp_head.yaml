# BP head 训练器配置（Path A Stream 2）
#
# 单一回归目标 MSE(pred_mmHg, target_mmHg)，无 RF / mask / sampler 复杂度。
# 默认 stage='pretrain' 走 Train_Subset 80/20 划分；用 finetune_bp_head.sh
# 切到 stage='finetune' 用 CalFree 80/10/10 calibration-based 微调。

epochs: 30
lr: 1.0e-3
weight_decay: 1.0e-6
grad_clip_norm: 1.0

lr_scheduler:
  name: cosine
  min_lr: 1.0e-5
  first_cycle_pct: 1.0
  cycle_mult: 1

amp:
  enabled: true

# BPHead v2 (~460k 参数 + PatchTSMixer)，max-autotune 仍然不值得。
# default 模式（走 inductor，但不做 CUDA Graphs / autotune）足够。
compile:
  enabled: true
  mode: default

val_every: 1
ckpt_every: 1
log_filename: bp_head_loss.csv
log_every_n_steps: 50

stage: pretrain
init_from: null
