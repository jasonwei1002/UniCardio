# BP head 训练器配置
#
# L1 回归目标（归一化 BP 标签空间），固定单任务 bp_task（默认 ecgppg2abp），
# 不像 RF trainer 每 batch 随机采 task；无 RF / mask / sampler 复杂度。
# 默认 stage='pretrain' 走 Train_Subset 80/20 划分；用 finetune_bp_head.sh
# 切到 stage='finetune' 用 CalFree 80/10/10 calibration-based 微调。

epochs: 30
lr: 1.0e-3
weight_decay: 1.0e-6
grad_clip_norm: 1.0

lr_scheduler:
  name: cosine
  min_lr: 1.0e-5
  first_cycle_pct: 1.0
  cycle_mult: 1

amp:
  enabled: true

# BPHead v2 (~460k 参数 + PatchTSMixer)，max-autotune 仍然不值得。
# default 模式（走 inductor，但不做 CUDA Graphs / autotune）足够。
compile:
  enabled: true
  mode: default

val_every: 1
ckpt_every: 1
log_filename: bp_head_loss.csv
log_every_n_steps: 50

stage: pretrain
init_from: null

# Single fixed ABP-target task — the BP head does NOT randomly sample a task
# per batch like the RF trainer. cond_slots_to_vitals(bp_task) sets the head's
# active_vitals for every step; ecgppg2abp -> active_vitals=["ecg","ppg"]
# (both vitals, averaged), matching how bp_metrics feeds the multimodal eval
# cascade. Must be an ABP-target task whose vitals exist on the head.
bp_task: ecgppg2abp

# Weighted Contrastive Loss (MD-ViSCo §6.2.2, faithful multi-WCL). When
# enabled, loss_mode is resolved from (wcl, stage):
#   stage=pretrain + pretrain_contrastive_only=true -> "wcl_only"
#     (self-supervised contrastive pretraining of the encoders; the
#      train_bp_head.sh stage-1 path)
#   stage=finetune (or pretrain_contrastive_only=false) -> "l1+wcl"
#     (L_ref = L_MAE + multi-WCL; the finetune_bp_head.sh stage-2 path)
# enabled=false -> pure L1 (legacy). Term hyperparameters default to
# DEFAULT_WCL_TERMS (src/trainer_module/wcl.py); override via `wcl.terms`
# (list of {name, embedding_key, weight_key, temperature_embeddings,
# temperature_weight, threshold, scale_factor}).
wcl:
  enabled: true
  pretrain_contrastive_only: true
  terms: null
