# UniCardioRF 模型结构配置
#
# channels 必须等于 len(kernel_sizes) * per_kernel_channels；构造函数中
# 会检查这一点，以便尽早发现配置笔误。

slot_length: ${data.slot_length}
n_slots: 3
channels: 288          # 6 个卷积核 * 每个核 48 通道
nheads: 9
n_layers: 5
time_embedding_dim: 256
kernel_sizes: [1, 3, 5, 7, 9, 11]
per_kernel_channels: 48
ffn_dim: 64
# slot 内下采样倍率（必须是 2 的幂、且 slot_length 能整除）。ds=2 把 transformer
# 看到的 token 数减半，attention FLOPs 降到 1/4；代价是把 PEP / R 峰位置等
# 跨模态对齐所需的 8ms 级时间分辨率打成 16ms，会吞掉 ecgppg2abp 相对
# ppg2abp 的多模态优势。pulsedb 上若想追多模态增益，保持 ds=1。
downsample_factor: 1
