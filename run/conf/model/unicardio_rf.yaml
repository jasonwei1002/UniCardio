# Model architecture configuration for UniCardioRF.
#
# channels MUST equal len(kernel_sizes) * per_kernel_channels; the constructor
# enforces this to catch typos early.

slot_length: 500
n_slots: 3
channels: 288          # 6 kernels * 48 channels
nheads: 8
n_layers: 5
time_embedding_dim: 256
kernel_sizes: [1, 3, 5, 7, 9, 11]
per_kernel_channels: 48
ffn_dim: 64
