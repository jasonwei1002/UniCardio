# UniCardio Rectified Flow 主配置
#
# Hydra 会将本文件与 data/default、model/unicardio_rf、trainer/default、
# sampler/euler8 组合起来。任何字段都可在命令行覆盖，例如：
#   python run/pipeline/train.py trainer.epochs=10 device=cpu

defaults:
  - data: default
  - model: unicardio_rf
  - trainer: default
  - sampler: euler8
  - _self_

seed: 42
device: cuda
deterministic: false
output_dir: ${hydra:runtime.output_dir}

hydra:
  run:
    dir: run/outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: run/outputs/sweep_${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
