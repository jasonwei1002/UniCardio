# UniCardio Rectified Flow 主配置
#
# Hydra 会将本文件与 data/default、model/unicardio_rf、trainer/default、
# sampler/euler8 组合起来。任何字段都可在命令行覆盖，例如：
#   python run/pipeline/train.py trainer.epochs=10 device=cpu

defaults:
  - data: default
  - model: unicardio_rf
  - trainer: default
  - sampler: euler8
  - _self_

seed: 42
device: cuda
deterministic: false
output_dir: ${hydra:runtime.output_dir}

# SwanLab 实验追踪。日志文件默认落到 ${output_dir}/swanlog。
# mode: cloud  上传到 swanlab 云端（需提前 `swanlab login`）
#       local  仅写本地日志，可用 `swanlab watch` 离线查看
#       offline 记录到本地但以 offline 模式（便于之后 sync）
#       disabled 完全关闭（API 变为 no-op）
swanlab:
  enabled: true
  project: UniCardio
  experiment_name: null     # null 时由 swanlab 自动命名
  description: null
  tags: []
  mode: cloud

hydra:
  run:
    # 目录名带 stage 后缀（pretrain / finetune），ls run/outputs/ 一眼分辨。
    # hydra.run.dir 在主 cfg 合并之前解析，无法直接引用 ${trainer.stage}；
    # 改读环境变量 UNICARDIO_STAGE，由 train.sh / finetune.sh export，默认 pretrain。
    dir: run/outputs/${now:%Y-%m-%d_%H-%M-%S}_${oc.env:UNICARDIO_STAGE,pretrain}
  sweep:
    dir: run/outputs/sweep_${now:%Y-%m-%d_%H-%M-%S}_${oc.env:UNICARDIO_STAGE,pretrain}
    subdir: ${hydra.job.num}
  job:
    chdir: false
